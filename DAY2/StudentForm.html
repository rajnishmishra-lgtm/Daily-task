<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Student Form</title> 
    </head>
    <body>
        <h1>Student Form</h1>
        <form action="submit" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>
            <label for="phone number" >Phone Number:</label>
            <input type="tel" id="phone number" name="phone number" required><br><br>
            <label for="gender">Gender:</label><br></br>
            <input type="radio" id="male" name="gender" value="male" required>Male
            <input type="radio" id="female" name="gender" value="Female" required>Female
            <input type="radio" id="other" name="gender" value="Other" required>Other<br><br>
            <label for="DOB">DOB:</label>
            <input type="date" id="DOB" name="DOB" required max="2026-06-23"><br><br>
            <label for="course selection">Course Selection:</label>
            <select id="course selection" name="course selection" required>
                <option value="course1">HTML</option>
                <option value="course2">CSS</option>
                <option value="course3">JavaScript</option>
                <option value="course4">ReactJs</option>
            </select><br><br>
            <label for="submit"></label>
            <input type="submit" id="submit" name="submit">
        </form>
    </body>
</html>
