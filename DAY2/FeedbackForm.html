<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
</head>
<body>
    <form action="submit" method="post">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required><br><br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required><br><br>
    <p>Rate your experience:</p>
    <input type="radio" id="1" name="rate" value="1">
    <label for="1">1</label>
    <input type="radio" id="2" name="rate" value="2">
    <label for="1">2</label>
    <input type="radio" id="3" name="rate" value="3">
    <label for="1">3</label>
    <input type="radio" id="4" name="rate" value="4">
    <label for="1">4</label>
    <input type="radio" id="5" name="rate" value="5">
    <label for="5">5</label><br><br>
     <label for="message">Feedback:</label><br>
            <textarea id="message" name="message" rows="5" cols="40" minlength="50" maxlength="200" required></textarea><br>
    <label for="submit"></label>
            <input type="submit" id="submit" name="submit"><br><br>
    </form>
</body>
</html>
