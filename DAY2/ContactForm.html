<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact Form</title>
    </head>
    <body>
        <h1>Contact Form</h1>
        <form action="submit" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter name" name="name" required><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter email" name="email" required><br><br>
            <label for="subject">Subject:</label>
            <input type="text" id="subject" placeholder="Enter subject" name="subject" required><br><br>
            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="5" cols="40" placeholder="Enter message..." maxlength="200" required></textarea><br>
            <input type="submit" value="Submit">
        </form>
    </body>
</html>
